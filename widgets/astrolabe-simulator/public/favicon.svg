<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Astrolabe Simulator">
  <style>
    .t0 { stop-color: #a4243b }
    .t1 { stop-color: #7d1b2b }
    .brass { stroke: #f1c453 }
    .light { stroke: #fdf2e0; fill: #fdf2e0 }
    @media (prefers-color-scheme: dark) {
      .t0 { stop-color: #c33049 }
      .t1 { stop-color: #8f2030 }
      .brass { stroke: #ffd166 }
      .light { stroke: #fff4e2; fill: #fff4e2 }
    }
  </style>
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" class="t0" />
      <stop offset="1" class="t1" />
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="30" height="30" rx="7" fill="url(#tile)" />
  <g fill="none" stroke-linecap="round">
    <circle class="brass" cx="16" cy="16" r="11.5" stroke-width="2" />
    <circle class="light" cx="16" cy="16" r="7.4" stroke-width="1.15" />
    <path class="light" d="M16 5.2v21.6M7 16h18" stroke-width="1" opacity=".72" />
    <path class="brass" d="M9.6 21.7c2.5-5.4 5.1-8.8 11.9-11.8" stroke-width="1.4" />
  </g>
  <circle class="light" cx="16" cy="16" r="1.5" stroke="none" />
</svg>
