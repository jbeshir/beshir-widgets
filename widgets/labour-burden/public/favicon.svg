<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Labour Burden">
  <style>
    .t0 { stop-color: #a4243b }
    .t1 { stop-color: #7d1b2b }
    .gl { stroke: #fdf2e0 }
    .gold { stroke: #f1c453 }
    @media (prefers-color-scheme: dark) {
      .t0 { stop-color: #c33049 }
      .t1 { stop-color: #8f2030 }
      .gl { stroke: #fff4e2 }
      .gold { stroke: #ffd166 }
    }
  </style>
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" class="t0" />
      <stop offset="1" class="t1" />
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="30" height="30" rx="7" fill="url(#tile)" />
  <line class="gl" x1="7" y1="11" x2="23" y2="11" stroke-width="2.6" stroke-linecap="round" />
  <line class="gl" x1="7" y1="16" x2="21" y2="16" stroke-width="2.6" stroke-linecap="round" />
  <line class="gold" x1="21" y1="16" x2="27" y2="16" stroke-width="2.6" stroke-linecap="round" />
  <line class="gl" x1="7" y1="21" x2="17" y2="21" stroke-width="2.6" stroke-linecap="round" />
</svg>
