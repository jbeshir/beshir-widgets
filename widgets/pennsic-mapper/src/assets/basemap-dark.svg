<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Schematic map of the Pennsic War campsite: Topside camping ring around a battlefield and Mt. Eislinn, a Troll/Registration divider, and the Bog with Cooper's Lake, Runestone Hill, the Barn, and Pennsic University">
  <title>Pennsic camp map (original schematic illustration, dark theme)</title>

  <!-- Ground: Topside (dominant, matches the app's calibrated dark background #15100d) and the Bog overlay -->
  <rect x="0" y="0" width="1200" height="800" fill="#15100d" />
  <rect x="0" y="410" width="1200" height="390" fill="#1b1410" />

  <!-- Camping ring: Topside/Bog camping blocks around the margin, subtly lettered by compass direction -->
  <g fill="#1f1712" stroke="#e9dcc4" stroke-width="1.5">
    <!-- top row -->
    <rect x="14" y="15" width="171" height="70" rx="3" />
    <rect x="213" y="15" width="171" height="70" rx="3" />
    <rect x="412" y="15" width="171" height="70" rx="3" />
    <rect x="611" y="15" width="171" height="70" rx="3" />
    <rect x="810" y="15" width="171" height="70" rx="3" />
    <rect x="1009" y="15" width="171" height="70" rx="3" />
    <!-- bottom row -->
    <rect x="14" y="715" width="171" height="70" rx="3" />
    <rect x="213" y="715" width="171" height="70" rx="3" />
    <rect x="412" y="715" width="171" height="70" rx="3" />
    <rect x="611" y="715" width="171" height="70" rx="3" />
    <rect x="810" y="715" width="171" height="70" rx="3" />
    <rect x="1009" y="715" width="171" height="70" rx="3" />
    <!-- left column -->
    <rect x="14" y="105" width="71" height="137" rx="3" />
    <rect x="14" y="262" width="71" height="137" rx="3" />
    <rect x="14" y="419" width="71" height="137" rx="3" />
    <rect x="14" y="576" width="71" height="137" rx="3" />
    <!-- right column -->
    <rect x="1109" y="105" width="71" height="137" rx="3" />
    <rect x="1109" y="262" width="71" height="137" rx="3" />
    <rect x="1109" y="419" width="71" height="137" rx="3" />
    <rect x="1109" y="576" width="71" height="137" rx="3" />
  </g>

  <g font-family="Georgia, 'Times New Roman', serif" fill="#e9dcc4" text-anchor="middle">
    <!-- kingdom names, a handful of the many kingdoms that camp at Pennsic -->
    <text x="99.5" y="55" font-size="20" font-style="italic">East</text>
    <text x="1094.5" y="55" font-size="20" font-style="italic">Middle</text>
    <text x="350" y="755" font-size="20" font-style="italic">Trimaris</text>
    <text x="895.5" y="755" font-size="20" font-style="italic">the West</text>
    <text x="1144.5" y="173.5" font-size="18" font-style="italic" transform="rotate(-90 1144.5 173.5)">Æthelmearc</text>
    <text x="1144.5" y="644.5" font-size="18" font-style="italic" transform="rotate(-90 1144.5 644.5)">Atlantia</text>

    <!-- compass-lettered camping blocks (subtle; not every block is labelled) -->
    <text x="298.5" y="55" font-size="17" font-weight="700">N1</text>
    <text x="895.5" y="55" font-size="17" font-weight="700">N2</text>
    <text x="1144.5" y="335.5" font-size="17" font-weight="700">E1</text>
    <text x="1144.5" y="492.5" font-size="17" font-weight="700">E2</text>
    <text x="497.5" y="755" font-size="17" font-weight="700">S1</text>
    <text x="696.5" y="755" font-size="17" font-weight="700">S2</text>
    <text x="49.5" y="178.5" font-size="17" font-weight="700">W1</text>
    <text x="49.5" y="492.5" font-size="17" font-weight="700">W2</text>
  </g>

  <!-- Gates: cut-throughs in the camping ring -->
  <g stroke="#e9dcc4" stroke-width="3" fill="#15100d">
    <rect x="570" y="10" width="60" height="80" />
    <rect x="10" y="370" width="80" height="60" />
    <rect x="210" y="710" width="80" height="60" />
  </g>
  <g stroke="#e9dcc4" stroke-width="2">
    <line x1="590" y1="20" x2="590" y2="80" />
    <line x1="610" y1="20" x2="610" y2="80" />
    <line x1="20" y1="390" x2="80" y2="390" />
    <line x1="20" y1="410" x2="80" y2="410" />
    <line x1="230" y1="720" x2="230" y2="760" />
    <line x1="250" y1="720" x2="250" y2="760" />
  </g>
  <!-- Main Gate, shown shut -->
  <g>
    <rect x="1110" y="370" width="80" height="60" fill="#332a22" stroke="#6b5c48" stroke-width="3" />
    <line x1="1110" y1="378" x2="1178" y2="430" stroke="#6b5c48" stroke-width="2" />
    <line x1="1110" y1="410" x2="1150" y2="430" stroke="#6b5c48" stroke-width="2" />
    <line x1="1140" y1="370" x2="1190" y2="400" stroke="#6b5c48" stroke-width="2" />
  </g>

  <g font-family="Georgia, 'Times New Roman', serif" fill="#e9dcc4" text-anchor="middle" font-size="20">
    <text x="615" y="112">North Gate</text>
    <text x="150" y="405">West Gate</text>
    <text x="250" y="700">Battlefield Gate</text>
    <text x="1060" y="405" fill="#9c8a6f" font-style="italic">Main Gate (closed)</text>
  </g>

  <!-- Merchant's Row -->
  <g fill="#c9903a" stroke="#e9dcc4" stroke-width="1.5">
    <polygon points="205,145 235,145 220,115" />
    <polygon points="255,145 285,145 270,115" />
    <polygon points="305,145 335,145 320,115" />
    <polygon points="355,145 385,145 370,115" />
    <polygon points="405,145 435,145 420,115" />
  </g>
  <text x="320" y="108" font-family="Georgia, 'Times New Roman', serif" fill="#e9dcc4" text-anchor="middle" font-size="22" font-weight="700">Merchant's Row</text>

  <!-- Food Court -->
  <rect x="445" y="140" width="90" height="30" rx="4" fill="#1f1712" stroke="#e9dcc4" stroke-width="1.5" />
  <circle cx="465" cy="155" r="6" fill="#da6276" />
  <circle cx="495" cy="155" r="6" fill="#da6276" />
  <text x="480" y="130" font-family="Georgia, 'Times New Roman', serif" fill="#e9dcc4" text-anchor="middle" font-size="22" font-weight="700">Food Court</text>

  <!-- Mt. Eislinn, behind the Fort -->
  <ellipse cx="730" cy="195" rx="90" ry="35" fill="#1f1712" stroke="#e9dcc4" stroke-width="2" />
  <text x="730" y="200" font-family="Georgia, 'Times New Roman', serif" fill="#e9dcc4" text-anchor="middle" font-size="22" font-weight="700">Mt. Eislinn</text>

  <!-- Battlefield, with the Fort at its centre -->
  <rect x="560" y="175" width="340" height="170" fill="none" stroke="#e9dcc4" stroke-width="2" stroke-dasharray="6 5" />
  <g>
    <rect x="690" y="235" width="80" height="50" fill="#1f1712" stroke="#e9dcc4" stroke-width="2" />
    <rect x="695" y="221" width="10" height="14" fill="#1f1712" stroke="#e9dcc4" stroke-width="1.5" />
    <rect x="715" y="221" width="10" height="14" fill="#1f1712" stroke="#e9dcc4" stroke-width="1.5" />
    <rect x="735" y="221" width="10" height="14" fill="#1f1712" stroke="#e9dcc4" stroke-width="1.5" />
    <rect x="755" y="221" width="10" height="14" fill="#1f1712" stroke="#e9dcc4" stroke-width="1.5" />
    <rect x="722" y="255" width="16" height="30" fill="#0b0805" />
    <line x1="730" y1="221" x2="730" y2="203" stroke="#e9dcc4" stroke-width="2" />
    <polygon points="730,203 748,209 730,215" fill="#da6276" />
  </g>
  <text x="730" y="303" font-family="Georgia, 'Times New Roman', serif" fill="#e9dcc4" text-anchor="middle" font-size="22" font-weight="700">The Fort</text>
  <text x="730" y="332" font-family="Georgia, 'Times New Roman', serif" fill="#e9dcc4" text-anchor="middle" font-size="22" font-weight="700">Battlefield</text>

  <!-- Troll: the dividing landmark between Topside and the Bog (doubles as Registration) -->
  <circle cx="600" cy="410" r="22" fill="#1f1712" stroke="#e9dcc4" stroke-width="2" />
  <circle cx="592" cy="405" r="3" fill="#e9dcc4" />
  <circle cx="608" cy="405" r="3" fill="#e9dcc4" />
  <text x="600" y="453" font-family="Georgia, 'Times New Roman', serif" fill="#e9dcc4" text-anchor="middle" font-size="22" font-weight="700">Troll</text>

  <!-- Cooper's Lake -->
  <path d="M 220 500 C 200 470, 260 460, 320 470 C 380 455, 430 470, 470 500 C 520 480, 555 510, 545 550 C 560 590, 520 620, 470 630 C 440 660, 380 655, 340 630 C 290 645, 230 620, 215 580 C 195 550, 200 520, 220 500 Z"
    fill="#24404b" stroke="#6fa0b3" stroke-width="2" />
  <text x="380" y="450" font-family="Georgia, 'Times New Roman', serif" fill="#e9dcc4" text-anchor="middle" font-size="22" font-weight="700">Cooper's Lake</text>

  <!-- Runestone Hill -->
  <ellipse cx="780" cy="520" rx="55" ry="28" fill="#1f1712" stroke="#e9dcc4" stroke-width="2" />
  <rect x="762" y="488" width="8" height="34" fill="#a8967a" stroke="#e9dcc4" stroke-width="1" />
  <rect x="780" y="482" width="8" height="40" fill="#a8967a" stroke="#e9dcc4" stroke-width="1" />
  <rect x="800" y="490" width="8" height="32" fill="#a8967a" stroke="#e9dcc4" stroke-width="1" />
  <text x="780" y="468" font-family="Georgia, 'Times New Roman', serif" fill="#e9dcc4" text-anchor="middle" font-size="22" font-weight="700">Runestone Hill</text>

  <!-- Barn / Great Hall -->
  <rect x="600" y="630" width="140" height="55" fill="#1f1712" stroke="#e9dcc4" stroke-width="2" />
  <polygon points="595,630 670,595 745,630" fill="#a8967a" stroke="#e9dcc4" stroke-width="1.5" />
  <rect x="655" y="655" width="30" height="30" fill="#0b0805" />
  <text x="670" y="708" font-family="Georgia, 'Times New Roman', serif" fill="#e9dcc4" text-anchor="middle" font-size="22" font-weight="700">Barn / Great Hall</text>

  <!-- Pennsic University -->
  <rect x="880" y="460" width="160" height="70" fill="#1f1712" stroke="#e9dcc4" stroke-width="2" />
  <polygon points="875,460 960,432 1045,460" fill="#a8967a" stroke="#e9dcc4" stroke-width="1.5" />
  <rect x="905" y="480" width="20" height="25" fill="#0b0805" />
  <rect x="1000" y="480" width="20" height="25" fill="#0b0805" />
  <text x="960" y="553" font-family="Georgia, 'Times New Roman', serif" fill="#e9dcc4" text-anchor="middle" font-size="22" font-weight="700">Pennsic University</text>

  <!-- Compass rose -->
  <circle cx="1030" cy="650" r="42" fill="none" stroke="#e9dcc4" stroke-width="2" />
  <line x1="1030" y1="608" x2="1030" y2="692" stroke="#e9dcc4" stroke-width="1.5" />
  <line x1="988" y1="650" x2="1072" y2="650" stroke="#e9dcc4" stroke-width="1.5" />
  <text x="1030" y="601" font-family="Georgia, 'Times New Roman', serif" fill="#e9dcc4" text-anchor="middle" font-size="14" font-weight="700">N</text>

  <!-- Decorative frame -->
  <rect x="4" y="4" width="1192" height="792" rx="8" fill="none" stroke="#e9dcc4" stroke-width="4" />
  <rect x="10" y="10" width="1180" height="780" rx="6" fill="none" stroke="#e9dcc4" stroke-width="1.5" opacity="0.5" />
</svg>
