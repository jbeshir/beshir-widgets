<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Japanese Verb Tower">
  <style>
    .t0 { stop-color: #a4243b }
    .t1 { stop-color: #7d1b2b }
    .gl { fill: #fdf2e0 }
    .gold { fill: #f1c453 }
    @media (prefers-color-scheme: dark) {
      .t0 { stop-color: #c33049 }
      .t1 { stop-color: #8f2030 }
      .gl { fill: #fff4e2 }
      .gold { fill: #ffd166 }
    }
  </style>
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" class="t0" />
      <stop offset="1" class="t1" />
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="30" height="30" rx="7" fill="url(#tile)" />
  <rect class="gold" x="11" y="8.5" width="10" height="4.6" rx="1.4" />
  <rect class="gl" x="9" y="14.2" width="14" height="4.6" rx="1.4" />
  <rect class="gl" x="7" y="19.9" width="18" height="4.6" rx="1.4" />
</svg>
