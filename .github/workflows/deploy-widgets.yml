name: Deploy widgets

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true
      - id: list
        run: |
          changed=()
          for dir in widgets/*/; do
            widget=$(basename "$dir")
            tag="refs/tags/deployed/${widget}"
            if git rev-parse -q --verify "$tag" >/dev/null && git diff --quiet "$tag" -- "widgets/${widget}"; then
              echo "skip (unchanged since last deploy): ${widget}"
              continue
            fi
            echo "deploy: ${widget}"
            changed+=("$widget")
          done
          matrix=$(printf '%s\n' "${changed[@]:-}" | grep -v '^$' | jq -R . | jq -s -c '{widget: .}')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  deploy:
    needs: discover
    strategy:
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
      fail-fast: false
    concurrency:
      group: deploy-${{ matrix.widget }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: widgets/${{ matrix.widget }}/package-lock.json
      - name: Install
        working-directory: widgets/${{ matrix.widget }}
        run: npm ci
      - name: Build
        working-directory: widgets/${{ matrix.widget }}
        run: npm run build
      - name: Deploy
        working-directory: widgets/${{ matrix.widget }}
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Record successful deploy
        run: |
          git tag -f "deployed/${{ matrix.widget }}" "${{ github.sha }}"
          git push origin "refs/tags/deployed/${{ matrix.widget }}" --force
