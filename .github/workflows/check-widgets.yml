name: Check widgets

on:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: node scripts/validate-widgets.mjs

  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: list
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          if ! git diff --quiet "$base" -- . ':!widgets' ':!shared'; then
            echo "repository-wide files changed — building all widgets"
            mapfile -t changed < <(find widgets -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort)
          else
            changed=()
            for dir in widgets/*/; do
              widget=$(basename "$dir")
              if ! git diff --quiet "$base" -- "widgets/${widget}"; then
                echo "changed: ${widget}"
                changed+=("$widget")
              fi
            done
          fi
          matrix=$(printf '%s\n' "${changed[@]:-}" | grep -v '^$' | jq -R . | jq -s -c '{widget: .}')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    needs: [validate, discover]
    strategy:
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: widgets/${{ matrix.widget }}/package-lock.json
      - name: Install
        working-directory: widgets/${{ matrix.widget }}
        run: npm ci
      - name: Build
        working-directory: widgets/${{ matrix.widget }}
        run: npm run build

      - name: Unit tests
        if: ${{ matrix.widget == 'astrolabe-simulator' }}
        working-directory: widgets/${{ matrix.widget }}
        run: npm test
      - name: Install browser for rendered gates
        working-directory: widgets/${{ matrix.widget }}
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium
      - name: First-paint gate
        working-directory: widgets/${{ matrix.widget }}
        run: NODE_PATH="$PWD/node_modules" node "$GITHUB_WORKSPACE/scripts/render.cjs" "$PWD/dist/index.html" widget-ready "$GITHUB_WORKSPACE/.render-out/${{ matrix.widget }}"
      - name: Computed/composited theme audit
        working-directory: widgets/${{ matrix.widget }}
        run: NODE_PATH="$PWD/node_modules" node "$GITHUB_WORKSPACE/scripts/audit-theme.cjs" "${{ matrix.widget }}" "$PWD/dist/index.html" "$GITHUB_WORKSPACE/.theme-audit/${{ matrix.widget }}"
      # Interaction + UX gate. Runs only for widgets that ship a journey.json
      # sidecar (see TESTING.md). Mirrors the local invocation of
      # scripts/journey.cjs <dist/index.html> <journey.json> <out-dir>.
      - name: Journey gate (interaction + UX)
        if: ${{ hashFiles(format('widgets/{0}/journey.json', matrix.widget)) != '' }}
        working-directory: widgets/${{ matrix.widget }}
        run: |
          NODE_PATH="$PWD/node_modules" node "$GITHUB_WORKSPACE/scripts/journey.cjs" \
            "$PWD/dist/index.html" \
            "$PWD/journey.json" \
            "$GITHUB_WORKSPACE/.journey-out/${{ matrix.widget }}"
      - name: Upload journey gallery
        if: ${{ always() && hashFiles(format('widgets/{0}/journey.json', matrix.widget)) != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: journey-${{ matrix.widget }}
          path: .journey-out/${{ matrix.widget }}
          if-no-files-found: ignore
      - name: Upload theme audit
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: theme-audit-${{ matrix.widget }}
          path: .theme-audit/${{ matrix.widget }}
          if-no-files-found: ignore
