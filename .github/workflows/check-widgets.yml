name: Check widgets

on:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: node scripts/validate-widgets.mjs

  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
      - id: list
        run: |
          echo "matrix=$(ls -1 widgets | jq -R . | jq -s -c '{widget: .}')" >> "$GITHUB_OUTPUT"

  build:
    needs: [validate, discover]
    strategy:
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: widgets/${{ matrix.widget }}/package-lock.json
      - name: Install
        working-directory: widgets/${{ matrix.widget }}
        run: npm ci
      - name: Build
        working-directory: widgets/${{ matrix.widget }}
        run: npm run build
      # Interaction + UX gate. Runs only for widgets that ship a journey.json
      # sidecar (see TESTING.md). Mirrors the local invocation of
      # scripts/journey.cjs <dist/index.html> <journey.json> <out-dir>.
      - name: Journey gate (interaction + UX)
        if: ${{ hashFiles(format('widgets/{0}/journey.json', matrix.widget)) != '' }}
        working-directory: widgets/${{ matrix.widget }}
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium
          NODE_PATH="$PWD/node_modules" node "$GITHUB_WORKSPACE/scripts/journey.cjs" \
            "$PWD/dist/index.html" \
            "$PWD/journey.json" \
            "$GITHUB_WORKSPACE/.journey-out/${{ matrix.widget }}"
      - name: Upload journey gallery
        if: ${{ always() && hashFiles(format('widgets/{0}/journey.json', matrix.widget)) != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: journey-${{ matrix.widget }}
          path: .journey-out/${{ matrix.widget }}
          if-no-files-found: ignore
